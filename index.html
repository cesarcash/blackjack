<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="https://stackpath.bootstrapcdn.com/bootstrap/4.4.1/css/bootstrap.min.css" integrity="sha384-Vkoo8x4CGsO3+Hhxv8T/Q5PaXtkKtu6ug5TOeNV6gBiFeWPGFN9MuhOf23Q9Ifjh" crossorigin="anonymous">
    <link rel="stylesheet" href="assets/style/estilos.css">
</head>
<body>
    <header class="titulo">
        <h1>Blackjack</h1>

    <details open>

            Opciones
        </summary>
        <div class="row mt-2">
            <div class="col text-center">
                <button id="btnNuevo" class="btn btn-danger">Nuevo juego</button>

        </div>    
    </details>
    <div class="row container">
        <div class="col">
            <h1>
                Jugador 1 - <small>0</small>

            <div id="jugador-cartas" class="divCartas">
                <!--<img src="assets/cartas/2c.png" class="carta">-->
            </div>
        </div>
    </div>


    <div class="row container">
        <div class="col">
            <h1>Computadora - <small>0</small></h1>
            <div id="maquina-cartas" class="divCartas">
                <!-- <img src="assets/cartas/3c.png" class="carta"> -->
            </div>
        </div>
    </div>
    <script src="assets/js/underscore.min.js"></script>
    <script src="assets/js/app.js"></script>
    <script>
        console.log( miApp );
        
        document.querySelector('#btnNuevo').addEventListener('click', () => {
            miApp.nuevoJuego();
        })

</body>
</html>
